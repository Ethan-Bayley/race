<!doctype html>
<html>
    <head>
        <meta charset="utf-8">
        <link rel="preload" href="./forced_square.woff2" as="font" type="font/woff2" crossorigin="anonymous"/>
        <link rel="preload" href="./images/logo.svg" as="image" type="image/svg+xml"/>
        <link rel="preload" href="./images/discord.svg" as="image" type="image/svg+xml"/>
        <link rel="manifest" href="./manifest.json"/>
        <meta name="viewport" content="./width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1,viewport-fit=cover,user-scalable=no.bin">
        <script defer="defer" src="./error_screen.bundle.js"></script>
        <script defer="defer" src="./main.bundle.js"></script>
    </head>
    <body>
        <button id="migrate-localstorage" style="position:fixed;top:10px;right:10px;z-index:9999;padding:8px 12px;font-size:13px;">Migrate localStorage</button>
        <canvas id="screen"></canvas>
        <div id="ui"></div>
        <div id="transition-layer"></div>
        <script>
            document.getElementById('migrate-localstorage').addEventListener('click', function () {
                try {
                    var payload = JSON.stringify(localStorage);
                    var encoded = btoa(payload);
                    var target = 'https://bookshelf2026.github.io/race?import=' + encodeURIComponent(encoded);
                    window.location.href = target;
                } catch (err) {
                    console.error('LocalStorage migration failed', err);
                    alert('Failed to export localStorage: ' + err.message);
                }
            });
        </script>
    </body>
</html>
